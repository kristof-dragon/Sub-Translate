services:
  api:
    build: ./api
    container_name: translate_api
    restart: unless-stopped
    environment:
      - DATA_DIR=/data
      - DATABASE_URL=sqlite:////data/app.db
      - MEDIA_DIR=/media
    volumes:
      - ./data:/data
      # Host media folder the browser UI lists MKVs from. Read-only:
      # the api only needs to read MKVs + extract tracks into /data/uploads.
      - ${MEDIA_PATH:-./media}:/media:ro
    expose:
      - "8000"
    ports:
      - "${API_PORT:-8080}:8000"

  web:
    build: ./web
    container_name: translate_web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-8081}:80"

  mkvtoolnix-gui:
    # jlesage's noVNC wrapper around the MKVToolNix GUI — for interactive
    # edits when the app's own track picker isn't enough. Same media folder
    # is mounted, so files appear in both places.
    image: jlesage/mkvtoolnix
    container_name: translate_mkvtoolnix_gui
    restart: unless-stopped
    environment:
      - USER_ID=${UID:-1000}
      - GROUP_ID=${GID:-1000}
      - KEEP_APP_RUNNING=1
    volumes:
      - ./data/mkvtoolnix-config:/config
      - ${MEDIA_PATH:-./media}:/storage
    ports:
      - "${GUI_PORT:-5800}:5800"
